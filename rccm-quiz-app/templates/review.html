{% extends "base.html" %}
{% block title %}復習リスト | RCCM試験問題集{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>復習リスト</h2>
    <p>ここに復習リストが表示されます。</p>

    <div id="bookmark-list" class="mt-3">
        <!-- ブックマークされた問題がここに表示されます -->
        <p id="loading-message">復習リストを読み込み中...</p>
        <p id="no-bookmarks" style="display: none;">復習リストは空です。</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const bookmarkListDiv = document.getElementById('bookmark-list');
        const loadingMessage = document.getElementById('loading-message');
        const noBookmarksMessage = document.getElementById('no-bookmarks');

        // 問題を表示する関数
        function displayQuestions(questions) {
            loadingMessage.style.display = 'none';
            if (questions.length === 0) {
                noBookmarksMessage.style.display = 'block';
                return;
            }

            questions.forEach(question => {
                const questionElement = document.createElement('div');
                questionElement.classList.add('card', 'mb-3');
                questionElement.innerHTML = `
                    <div class="card-body">
                        <h5 class="card-title">${question.category} - ${question.difficulty}</h5>
                        <p class="card-text">${question.question}</p>
                        <a href="/quiz?qid=${question.id}" class="btn btn-primary">回答する</a>
                    </div>
                `;
                bookmarkListDiv.appendChild(questionElement);
            });
        }

        // ブックマークIDを取得するAPIを呼び出す
        fetch('/api/bookmarks')
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    console.error('Error fetching bookmark IDs:', data.error);
                    loadingMessage.textContent = '復習リストの読み込み中にエラーが発生しました。';
                    return;
                }

                const bookmarkIds = data.bookmark_ids;

                if (!bookmarkIds || bookmarkIds.length === 0) {
                    loadingMessage.style.display = 'none';
                    noBookmarksMessage.style.display = 'block';
                    return;
                }

                // ブックマークされた問題の詳細を取得するAPIを呼び出す
                fetch('/api/review/questions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question_ids: bookmarkIds }),
                })
                .then(response => response.json())
                .then(data => {
                    loadingMessage.style.display = 'none';
                    if (data.error) {
                        console.error('Error fetching bookmarked questions:', data.error);
                        bookmarkListDiv.innerHTML = '<p>復習問題の取得中にエラーが発生しました。</p>';
                        return;
                    }

                    const questions = data.questions;

                    if (!questions || questions.length === 0) {
                        noBookmarksMessage.style.display = 'block';
                        return;
                    }

                    // 取得した問題を表示
                    displayQuestions(questions);
                })
                .catch(error => {
                    console.error('Error fetching bookmarked questions:', error);
                    loadingMessage.style.display = 'none';
                    bookmarkListDiv.innerHTML = '<p>復習問題の取得中に予期しないエラーが発生しました。</p>';
                });

            })
            .catch(error => {
                console.error('Error fetching bookmark IDs:', error);
                loadingMessage.textContent = '復習リストの読み込み中に予期しないエラーが発生しました。';
            });
    });
</script>
{% endblock %}
