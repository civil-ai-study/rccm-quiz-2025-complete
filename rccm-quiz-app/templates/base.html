<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>{% block title %}RCCM試験問題集 - AI学習アシスタント{% endblock %}</title>
    
    <!-- 🔥 CRITICAL: 超強力キャッシュクリア（ユーザー要求による） -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="-1">
    <script>
        // 🔥 ページ読み込み時のキャッシュ強制クリア（ユーザー要求による）
        (function() {
            if (window.performance && window.performance.navigation.type === 2) {
                // 戻るボタンでアクセスされた場合は強制リロード
                window.location.reload(true);
            }
            // セッションストレージの問題関連データもクリア
            if (typeof(Storage) !== "undefined") {
                sessionStorage.removeItem('exam_data');
                sessionStorage.removeItem('current_question');
                sessionStorage.removeItem('question_answers');
            }
        })();
    </script>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- アクセシビリティ改善 -->
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="RCCM試験問題集">
    <meta name="application-name" content="RCCM問題集">
    <meta name="msapplication-TileColor" content="#667eea">
    <meta name="theme-color" content="#667eea">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ダークモード対応CSS -->
    <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #1e293b;
      --card-bg: #f8fafc;
      --border-color: #e2e8f0;
      /* モダン・シック・インテリジェンスなカラーパレット */
      --primary-color: #334155; /* プロフェッショナルスレートグレー */
      --secondary-color: #475569; /* エレガントグレー */
      --success-color: #059669; /* 洗練されたエメラルド */
      --danger-color: #dc2626; /* 控えめなレッド */
      --warning-color: #d97706; /* インテリジェントアンバー */
      --info-color: #0284c7; /* 知的ブルー */
      --dark-color: #0f172a; /* ディープネイビー */
      --light-color: #f1f5f9; /* ソフトグレー */
      --text-muted-color: #64748b; /* 上品なミュート */
      --accent-color: #6366f1; /* 知性のインディゴ */
      --surface-color: #ffffff;
    }

    [data-theme="dark"] {
      --bg-color: #0f172a;
      --text-color: #e2e8f0;
      --card-bg: #1e293b;
      --border-color: #334155;
      /* ダークモード - エレガント&プロフェッショナル */
      --primary-color: #64748b; /* ソフトスレート */
      --secondary-color: #94a3b8; /* ライトグレー */
      --success-color: #10b981; /* エメラルド */
      --danger-color: #ef4444; /* 洗練されたレッド */
      --warning-color: #f59e0b; /* ゴールド */
      --info-color: #3b82f6; /* ブライトブルー */
      --dark-color: #f1f5f9; /* ライトテキスト */
      --light-color: #1e293b; /* ダークサーフェス */
      --text-muted-color: #94a3b8; /* エレガントミュート */
      --accent-color: #818cf8; /* ライトインディゴ */
      --surface-color: #1e293b;
    }

    body { 
      background-color: var(--bg-color) !important; 
      color: var(--text-color) !important; 
    }

    /* モダン&プロフェッショナルBootstrapカラー変数の上書き */
    .btn-primary {
        --bs-btn-bg: var(--primary-color);
        --bs-btn-border-color: var(--primary-color);
        --bs-btn-hover-bg: #1e293b;
        --bs-btn-hover-border-color: #0f172a;
        --bs-btn-active-bg: #0f172a;
        --bs-btn-active-border-color: #020617;
        color: white;
        font-weight: 500;
        border-radius: 0.5rem;
    }
    .btn-secondary {
        --bs-btn-bg: var(--secondary-color);
        --bs-btn-border-color: var(--secondary-color);
        --bs-btn-hover-bg: #334155;
        --bs-btn-hover-border-color: #1e293b;
        --bs-btn-active-bg: #1e293b;
        --bs-btn-active-border-color: #0f172a;
        color: white;
        font-weight: 500;
        border-radius: 0.5rem;
    }
    .btn-success {
        --bs-btn-bg: var(--success-color);
        --bs-btn-border-color: var(--success-color);
        --bs-btn-hover-bg: #047857;
        --bs-btn-hover-border-color: #065f46;
        --bs-btn-active-bg: #558b2f;
        --bs-btn-active-border-color: #33691e;
    }
    .btn-danger {
        --bs-btn-bg: var(--danger-color);
        --bs-btn-border-color: var(--danger-color);
        --bs-btn-hover-bg: #ff1744;
        --bs-btn-hover-border-color: #d50000;
        --bs-btn-active-bg: #c62828;
        --bs-btn-active-border-color: #b71c1c;
    }
    .btn-warning {
        --bs-btn-bg: var(--warning-color);
        --bs-btn-border-color: var(--warning-color);
        --bs-btn-hover-bg: #ffb300;
        --bs-btn-hover-border-color: #ffa000;
        --bs-btn-active-bg: #ff8f00;
        --bs-btn-active-border-color: #ff6f00;
        --bs-btn-color: #212529; /* 文字色を黒に */
    }
     .btn-info {
        --bs-btn-bg: var(--info-color);
        --bs-btn-border-color: var(--info-color);
        --bs-btn-hover-bg: #1e88e5;
        --bs-btn-hover-border-color: #1976d2;
        --bs-btn-active-bg: #1565c0;
        --bs-btn-active-border-color: #0d47a1;
    }
    .btn-dark {
        --bs-btn-bg: var(--dark-color);
        --bs-btn-border-color: var(--dark-color);
        --bs-btn-hover-bg: #212529;
        --bs-btn-hover-border-color: #1a1d20;
        --bs-btn-active-bg: #1a1d20;
        --bs-btn-active-border-color: #131619;
    }

    .card { 
      background-color: var(--card-bg) !important; 
      color: var(--text-color) !important;
      border-color: var(--border-color) !important;
    }

    /* ナビゲーションバーの色 */
    .navbar-custom {
        background-color: var(--primary-color) !important;
    }
    .navbar-custom .nav-link, .navbar-custom .navbar-brand {
        color: var(--light-color) !important;
    }

    [data-theme="dark"] .card { 
      background-color: var(--card-bg) !important; 
      color: var(--text-color) !important;
      border-color: var(--border-color) !important;
    }
    [data-theme="dark"] .navbar-custom {
      background-color: #0d1117 !important; /* ダークモード用ナビゲーションバー */
    }
    [data-theme="dark"] .alert { 
      background-color: var(--card-bg) !important;
      border-color: var(--border-color) !important;
      color: var(--text-color) !important;
    }
    [data-theme="dark"] .table { 
      color: var(--text-color) !important; 
    }
    [data-theme="dark"] .table td, [data-theme="dark"] .table th { 
      border-color: var(--border-color) !important; 
    }

    /* 今後開発予定の項目をグレーアウト */
    .future-feature {
        color: var(--text-muted-color) !important;
        font-style: italic;
    }
    
    /* 学習ストリーク表示スタイル */
    .streak-display {
      background: linear-gradient(45deg, #FF6B35, #F7931E);
      color: white;
      border-radius: 25px;
      padding: 0.5rem 1rem;
      font-weight: bold;
      display: inline-block;
      margin: 0.5rem 0;
      animation: glow 2s ease-in-out infinite alternate;
    }
    
    @keyframes glow {
      from { box-shadow: 0 0 5px rgba(255, 107, 53, 0.3); }
      to { box-shadow: 0 0 20px rgba(255, 107, 53, 0.6); }
    }
    
    [data-theme="dark"] .streak-display {
      background: linear-gradient(45deg, #FF6B35, #F7931E);
    }
    
    /* SRS用バッジ */
    .badge.bg-gold {
      background-color: #ffd700 !important;
      color: #000 !important;
    }

    /* 解答結果画面のスタイル */
    .card-correct {
      border-color: var(--success-color) !important;
      background-color: #d4edda !important; /* 淡い緑 */
    }
    .card-incorrect {
      border-color: var(--danger-color) !important;
      background-color: #f8d7da !important; /* 淡い赤 */
    }
    [data-theme="dark"] .card-correct {
      border-color: var(--success-color) !important;
      background-color: #1e3c2f !important; /* ダークモード用の緑 */
    }
    [data-theme="dark"] .card-incorrect {
      border-color: var(--danger-color) !important;
      background-color: #4e2b31 !important; /* ダークモード用の赤 */
    }
    
    /* アクセシビリティ改善：大きなボタンクラス */
    .btn-accessibility-lg {
      min-height: 48px !important;
      padding: 12px 24px !important;
      font-size: 1.1rem !important;
      font-weight: 500 !important;
      border-radius: 8px !important;
      transition: all 0.3s ease !important;
    }
    
    .btn-accessibility-xl {
      min-height: 56px !important;
      padding: 16px 32px !important;
      font-size: 1.25rem !important;
      font-weight: 600 !important;
      border-radius: 10px !important;
      transition: all 0.3s ease !important;
    }
    
    /* タッチターゲットサイズの確保（WCAG基準） */
    .touch-target {
      min-width: 44px !important;
      min-height: 44px !important;
    }
    
    /* フォーカスインジケーターの強化 */
    button:focus,
    input:focus,
    select:focus,
    textarea:focus,
    a:focus {
      outline: 3px solid var(--accent-color) !important;
      outline-offset: 2px !important;
    }
    
    /* シニアユーザー向けの読みやすいフォントサイズ */
    @media (min-width: 768px) {
      .senior-friendly {
        font-size: 1.125rem !important;
        line-height: 1.75 !important;
      }
    }
    </style>

    <!-- Service Worker & PWA 登録 -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/static/sw.js')
            .then(function(registration) {
              console.log('ServiceWorker registration successful');
            })
            .catch(function(error) {
              console.log('ServiceWorker registration failed: ', error);
            });
        });
      }
    </script>
    {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-custom mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/" style="color: white !important;">RCCM試験問題集</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="/statistics" style="color: white !important;">解答結果分析</a></li>
        <li class="nav-item"><a class="nav-link" href="/categories" style="color: white !important;">部門別</a></li>
        <li class="nav-item"><a class="nav-link" href="/review" style="color: white !important;">復習リスト</a></li>
        <li class="nav-item"><a class="nav-link" href="/reset" style="color: white !important;">リセット</a></li>
        <li class="nav-item"><a class="nav-link" href="/help" style="color: white !important;">ヘルプ</a></li>
        <li class="nav-item ms-2">
          <button class="btn btn-outline-light btn-sm" onclick="toggleTheme()" id="themeToggle" title="ダークモード切替">
            🌙
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert alert-warning">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<footer class="text-center mt-4 mb-2 text-muted">
  RCCM試験問題集 &copy; 2025
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- メインJavaScript（分離版） -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<!-- モバイル機能JavaScript -->
<script src="{{ url_for('static', filename='js/mobile-features.js') }}"></script>

{% block scripts %}{% endblock %}
</body>
</html>
